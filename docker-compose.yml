# OpenClaw Docker/Podman Compose
# Architecture: Single gateway with agent sandbox isolation.
# Each agent's tool execution (shell, file I/O) runs in its own isolated container.
#
# Usage:
#   cp .env.example .env   # then fill in your values
#   ./setup.sh             # first-time setup + onboarding
#   podman-compose up -d   # subsequent starts

services:

  # ── Gateway ──────────────────────────────────────────────────────────────────
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gateway
    restart: unless-stopped

    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${TZ:-UTC}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENCLAW_SANDBOX: ${OPENCLAW_SANDBOX:-1}

    volumes:
      - ./config:/home/node/.openclaw/config
      - ./workspace:/home/node/.openclaw/workspace
      - ./canvas:/home/node/.openclaw/canvas
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock

    ports:
      # Podman 5+ uses pasta networking which CAN forward to container loopback.
      # These map Mac:PORT → VM → container's 127.0.0.1:PORT correctly.
      - "127.0.0.1:${OPENCLAW_PORT:-18789}:18789"
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - "127.0.0.1:${OPENCLAW_BROWSER_PORT:-18791}:18791"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18789/healthz >/dev/null 2>&1 || nc -z 127.0.0.1 18789"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── CLI (on-demand) ───────────────────────────────────────────────────────────
  # Run with: podman-compose run --rm openclaw-cli <command>
  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-cli
    network_mode: service:openclaw-gateway

    depends_on:
      openclaw-gateway:
        condition: service_healthy

    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${TZ:-UTC}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BROWSER: echo

    volumes:
      - ./config:/home/node/.openclaw/config
      - ./workspace:/home/node/.openclaw/workspace
      - ./canvas:/home/node/.openclaw/canvas

    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    profiles:
      - cli

  # ── Browserless (optional) ────────────────────────────────────────────────────
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: openclaw-browserless
    restart: unless-stopped

    environment:
      CONCURRENT: 10
      TIMEOUT: 60000
      TOKEN: ${BROWSERLESS_TOKEN:-}

    shm_size: 2gb
    security_opt:
      - no-new-privileges:true
    profiles:
      - browserless

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

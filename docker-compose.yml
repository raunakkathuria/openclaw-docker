# OpenClaw Docker Compose
# Architecture: Single gateway + isolated agent sandboxes.
#
# WHY the socat proxy?
# OpenClaw's gateway binds exclusively to 127.0.0.1 (container loopback).
# Docker port-forwarding delivers traffic to the container's eth0 interface,
# which never reaches loopback. The socat container shares the gateway's
# network namespace, listens on 0.0.0.0 (all interfaces including eth0),
# and forwards to 127.0.0.1 where the gateway actually listens.
#
# Usage:
#   cp .env.example .env        # fill in ANTHROPIC_API_KEY + OPENCLAW_GATEWAY_TOKEN
#   docker compose up -d        # start gateway + proxy
#   open http://localhost:18789  # web UI

services:

  # ── Gateway ───────────────────────────────────────────────────────────────────
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gateway
    restart: unless-stopped

    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${TZ:-UTC}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENCLAW_SANDBOX: ${OPENCLAW_SANDBOX:-1}

    volumes:
      - ./data:/home/node/.openclaw
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock

    ports:
      # Traffic from the host arrives here via socat (ports 18800/18802),
      # NOT directly at the gateway's loopback ports (18789/18791).
      - "127.0.0.1:${OPENCLAW_PORT:-18789}:18800"        # → socat → gateway ws
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"  # bridge (direct)
      - "127.0.0.1:${OPENCLAW_BROWSER_PORT:-18791}:18802" # → socat → browser ctrl

    healthcheck:
      # Runs inside the container — can reach loopback directly.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18789/healthz >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Loopback proxies ──────────────────────────────────────────────────────────
  # Each shares the gateway's network namespace and forwards one port from
  # 0.0.0.0 (reachable via Docker's eth0 forwarding) to 127.0.0.1 (gateway loopback).

  # Web UI + WebSocket: host:18789 → container:18800 → gateway:18789
  openclaw-proxy-ws:
    image: alpine/socat
    container_name: openclaw-proxy-ws
    network_mode: "service:openclaw-gateway"
    command: TCP-LISTEN:18800,fork,reuseaddr TCP:127.0.0.1:18789
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_healthy

  # Browser control: host:18791 → container:18802 → gateway:18791
  openclaw-proxy-browser:
    image: alpine/socat
    container_name: openclaw-proxy-browser
    network_mode: "service:openclaw-gateway"
    command: TCP-LISTEN:18802,fork,reuseaddr TCP:127.0.0.1:18791
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_healthy

  # ── CLI (on-demand) ────────────────────────────────────────────────────────────
  # docker compose run --rm openclaw-cli <subcommand>
  # e.g. docker compose run --rm openclaw-cli channels add --channel telegram --token "<token>"
  #
  # The image's docker-entrypoint.sh calls `node <arg>`, so without an explicit
  # entrypoint `docker compose run --rm openclaw-cli onboard` would try to run
  # `node onboard` (module not found). Setting entrypoint here makes every
  # subcommand run as `node openclaw.mjs <subcommand>`.
  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-cli
    entrypoint: ["node", "openclaw.mjs"]
    network_mode: "service:openclaw-gateway"

    depends_on:
      openclaw-gateway:
        condition: service_healthy

    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${TZ:-UTC}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BROWSER: echo

    volumes:
      - ./data:/home/node/.openclaw

    stdin_open: true
    tty: true
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    profiles:
      - cli

  # ── Browserless (optional) ─────────────────────────────────────────────────────
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: openclaw-browserless
    restart: unless-stopped
    environment:
      CONCURRENT: 10
      TIMEOUT: 60000
      TOKEN: ${BROWSERLESS_TOKEN:-}
    shm_size: 2gb
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles:
      - browserless
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

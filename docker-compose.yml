# OpenClaw Docker Compose
# Architecture: Single gateway + isolated agent sandboxes.
# Each agent's tool execution runs in its own ephemeral container.
#
# Usage:
#   cp .env.example .env        # fill in ANTHROPIC_API_KEY + OPENCLAW_GATEWAY_TOKEN
#   docker compose up -d        # start
#   docker compose logs -f      # stream logs
#   open http://127.0.0.1:18789 # web UI

services:

  # ── Gateway ───────────────────────────────────────────────────────────────────
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gateway
    restart: unless-stopped

    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${TZ:-UTC}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENCLAW_SANDBOX: ${OPENCLAW_SANDBOX:-1}

    volumes:
      - ./config:/home/node/.openclaw/config
      - ./workspace:/home/node/.openclaw/workspace
      - ./canvas:/home/node/.openclaw/canvas
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock

    ports:
      - "127.0.0.1:${OPENCLAW_PORT:-18789}:18789"        # Web UI + WebSocket
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"  # Desktop pairing
      - "127.0.0.1:${OPENCLAW_BROWSER_PORT:-18791}:18791" # Browser control

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18789/healthz >/dev/null 2>&1 || nc -z 127.0.0.1 18789"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── CLI (on-demand) ────────────────────────────────────────────────────────────
  # docker compose run --rm openclaw-cli <command>
  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-cli
    network_mode: service:openclaw-gateway

    depends_on:
      openclaw-gateway:
        condition: service_healthy

    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${TZ:-UTC}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BROWSER: echo

    volumes:
      - ./config:/home/node/.openclaw/config
      - ./workspace:/home/node/.openclaw/workspace
      - ./canvas:/home/node/.openclaw/canvas

    stdin_open: true
    tty: true
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    profiles:
      - cli

  # ── Browserless (optional) ─────────────────────────────────────────────────────
  # docker compose --profile browserless up -d
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: openclaw-browserless
    restart: unless-stopped

    environment:
      CONCURRENT: 10
      TIMEOUT: 60000
      TOKEN: ${BROWSERLESS_TOKEN:-}

    shm_size: 2gb
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles:
      - browserless

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
